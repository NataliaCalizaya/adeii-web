name: Deploy Vite Site to Pages

on:
  push:
    branches: ["branch-1"] # Tu rama de visualización

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Quitamos el cache por ahora para evitar el error del lock file
      
      - name: Install dependencies
        run: npm install
        working-directory: ./client # <--- MUY IMPORTANTE: Indica dónde está el package.json

      - name: Build
        run: npm run build
        working-directory: ./client # <--- Indica dónde debe ejecutar el build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite genera 'dist' dentro de la carpeta 'client'
          path: ./client/dist 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
